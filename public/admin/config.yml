backend:
  name: git-gateway
  branch: main

site_url: https://nbk-no.netlify.app

media_folder: "public/img/uploads"
public_folder: "/img/uploads"

collections:
  # Pages
  - name: "pages"
    label: "Sider"
    folder: "public/content/pages"
    format: "json"
    fields:
      # Home page fields
      - { label: "Hero tittel", name: "hero_title", widget: "string" }
      - { label: "Hero undertittel", name: "hero_subtitle", widget: "string" }
      - { label: "Hero badge", name: "hero_badge", widget: "string" }
      - { label: "Hero bilde", name: "hero_image", widget: "image" }
      - { label: "Hero CTA tekst", name: "hero_cta_text", widget: "string" }
      - { label: "Hero sekundaer CTA", name: "hero_secondary_cta", widget: "string" }
      # About fields
      - { label: "Tittel", name: "title", widget: "string", required: false }
      - { label: "Undertittel", name: "subtitle", widget: "string", required: false }
      - { label: "Historietekst", name: "history_text", widget: "text", required: false }
      - label: "Statistikk"
        name: "stats"
        widget: "list"
        required: false
        fields:
          - { label: "Etikett", name: "label", widget: "string" }
          - { label: "Nummer", name: "number", widget: "string" }
      # Membership fields
      - label: "Medlemsplaner"
        name: "plans"
        widget: "list"
        required: false
        fields:
          - { label: "Navn", name: "name", widget: "string" }
          - { label: "Pris", name: "price", widget: "string" }
          - { label: "Fordeler", name: "features", widget: "list", field: { label: "Fordel", name: "feature", widget: "string" } }

  # News / Nyheter
  - name: "nyheter"
    label: "Nyheter"
    folder: "public/content/nyheter"
    format: "json"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Tittel", name: "title", widget: "string" }
      - { label: "Dato", name: "date", widget: "datetime" }
      - label: "Kategori"
        name: "category"
        widget: "select"
        options:
          - "Hoydepunkt"
          - "Nybegynner"
          - "Medlem"
          - "Regatta"
          - "Klinikk"
          - "Community"
      - { label: "Bilde", name: "image", widget: "image" }
      - { label: "Sammendrag", name: "summary", widget: "text" }
      - { label: "Innhold", name: "body", widget: "markdown" }
      - { label: "Sted", name: "location", widget: "string", required: false }

  # Events
  - name: "events"
    label: "Events"
    folder: "public/content/events"
    format: "json"
    create: true
    fields:
      - { label: "Tittel", name: "title", widget: "string" }
      - { label: "Dato", name: "date", widget: "datetime" }
      - { label: "Sluttdato", name: "end_date", widget: "datetime", required: false }
      - { label: "Sted", name: "location", widget: "string" }
      - label: "Disiplin"
        name: "discipline"
        widget: "select"
        options:
          - "Windsurfing"
          - "Wingfoil"
          - "Raceboard"
          - "iQFOiL"
          - "Bølgeseiling"
          - "Alle"
      - label: "Type"
        name: "type"
        widget: "select"
        options:
          - "Regatta"
          - "Klinikk"
          - "Community"
          - "NM"
      - { label: "Bilde", name: "image", widget: "image" }
      - { label: "Beskrivelse", name: "description", widget: "markdown" }
      - { label: "Pameldings-URL", name: "registration_url", widget: "string", required: false }
      - { label: "Fremhevet", name: "featured", widget: "boolean", default: false }

  # Clubs / Klubber
  - name: "klubber"
    label: "Klubber"
    folder: "public/content/klubber"
    format: "json"
    create: true
    fields:
      - { label: "Navn", name: "name", widget: "string" }
      - { label: "Forkortelse", name: "abbreviation", widget: "string" }
      - label: "Region"
        name: "region"
        widget: "select"
        options:
          - "Viken"
          - "Vestland"
          - "Agder"
          - "Rogaland"
          - "Troendelag"
          - "Nordland"
          - "Troms"
          - "Oslo"
      - { label: "Bilde", name: "image", widget: "image" }
      - { label: "Beskrivelse", name: "description", widget: "text" }
      - label: "Disipliner"
        name: "disciplines"
        widget: "list"
        field:
          label: "Disiplin"
          name: "discipline"
          widget: "select"
          options:
            - "Windsurfing"
            - "Wingfoil"
            - "Raceboard"
            - "iQFOiL"
            - "Wave"
            - "Freestyle"
      - { label: "Nettside", name: "website", widget: "string", required: false }
      - { label: "Kontakt e-post", name: "contact_email", widget: "string", required: false }

  # Grener / Disciplines
  - name: "grener"
    label: "Grener"
    folder: "public/content/grener"
    format: "json"
    create: true
    fields:
      - { label: "Navn", name: "name", widget: "string" }
      - { label: "Undertittel", name: "subtitle", widget: "string" }
      - { label: "Beskrivelse", name: "description", widget: "text" }
      - { label: "Bilde", name: "image", widget: "image" }
      - label: "Type"
        name: "type"
        widget: "select"
        options:
          - "Klassisk"
          - "Fremtiden"
          - "Strategi & Presisjon"
          - "Olympisk"
      - { label: "CTA tekst", name: "cta_text", widget: "string", default: "Les Mer" }
      - { label: "Rekkefolge", name: "order", widget: "number", default: 0 }
      - { label: "Detaljert beskrivelse", name: "long_description", widget: "markdown", required: false }
      - { label: "Utstyr", name: "equipment_text", widget: "text", required: false }
      - { label: "Kom i gang", name: "getting_started", widget: "text", required: false }
      - { label: "Hero-bilde (landingsside)", name: "hero_image", widget: "image", required: false }
      - label: "Galleri"
        name: "gallery"
        widget: "list"
        required: false
        field:
          label: "Bilde"
          name: "image"
          widget: "image"
      - label: "Nøkkelfakta"
        name: "key_facts"
        widget: "list"
        required: false
        fields:
          - { label: "Etikett", name: "label", widget: "string" }
          - { label: "Verdi", name: "value", widget: "string" }

  # Om Oss / About
  - name: "om-oss"
    label: "Om Oss"
    files:
      - label: "Om NBK"
        name: "about"
        file: "public/content/pages/om-oss.json"
        fields:
          - { label: "Badge", name: "badge", widget: "string", default: "Siden 1978" }
          - { label: "Tittel", name: "title", widget: "string" }
          - { label: "Undertittel", name: "subtitle", widget: "text" }
          - { label: "Hero bilde", name: "hero_image", widget: "image", required: false }
          - { label: "Historietekst", name: "history_text", widget: "text" }
          - label: "Statistikk"
            name: "stats"
            widget: "list"
            fields:
              - { label: "Tall", name: "number", widget: "string" }
              - { label: "Etikett", name: "label", widget: "string" }
          - label: "Styremedlemmer"
            name: "board_members"
            widget: "list"
            fields:
              - { label: "Navn", name: "name", widget: "string" }
              - { label: "Rolle", name: "role", widget: "string" }
              - { label: "Bilde", name: "image", widget: "image", required: false }
          - { label: "Kontakt e-post", name: "contact_email", widget: "string" }
          - { label: "Kontakt adresse", name: "contact_address", widget: "string" }

  # Site Settings
  - name: "settings"
    label: "Innstillinger"
    files:
      - label: "Sideinnstillinger"
        name: "general"
        file: "public/content/settings.json"
        fields:
          - { label: "Sidenavn", name: "site_name", widget: "string", default: "Norsk Brettseilerklubb" }
          - { label: "Kontakt e-post", name: "contact_email", widget: "string" }
          - { label: "Kontaktadresse", name: "contact_address", widget: "string" }
          - { label: "Facebook URL", name: "facebook_url", widget: "string", required: false }
          - { label: "Instagram URL", name: "instagram_url", widget: "string", required: false }
          - { label: "YouTube URL", name: "youtube_url", widget: "string", required: false }
          - { label: "Bunntekst", name: "footer_text", widget: "string" }
          - { label: "Sesongbadge", name: "season_badge", widget: "string" }

  # Dokumenter
  - name: "dokumenter"
    label: "Dokumenter"
    folder: "public/content/dokumenter"
    format: "json"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Tittel", name: "title", widget: "string" }
      - { label: "Dato", name: "date", widget: "datetime" }
      - label: "Kategori"
        name: "category"
        widget: "select"
        options:
          - "Årsmøte"
          - "Styremøte"
          - "Regnskap"
          - "Handlingsplan"
          - "Annet"
      - { label: "URL (Google Drive)", name: "url", widget: "string" }
      - { label: "Beskrivelse", name: "description", widget: "string", required: false }
      - label: "Filtype"
        name: "file_type"
        widget: "select"
        options:
          - "PDF"
          - "Google Doc"
          - "Regneark"
          - "Presentasjon"

  # Lenker
  - name: "lenker"
    label: "Lenker"
    folder: "public/content/lenker"
    format: "json"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Tittel", name: "title", widget: "string" }
      - { label: "URL", name: "url", widget: "string" }
      - { label: "Beskrivelse", name: "description", widget: "text" }
      - label: "Kategori"
        name: "category"
        widget: "select"
        options:
          - "Klasseforeninger"
          - "Vær og vind"
          - "Regelverk"
          - "Utstyr"
          - "Forbund"
          - "Annet"
      - { label: "Rekkefølge", name: "order", widget: "number", default: 0 }
